<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shake the Money</title>
  <!-- Load model URL from .env via PHP -->
  <script src="config.php"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Segoe UI", sans-serif; background: #000; }
    .screen { display: none; position: fixed; inset: 0; width: 100%; height: 100%; }
    .screen.active { display: flex; }
    .bg-cover { position: absolute; inset: 0; background-size: cover; background-position: center; background-repeat: no-repeat; }

    /* START */
    #startScreen { align-items: flex-end; justify-content: center; padding-bottom: 8vh; }
    #startScreen .bg-cover { background-image: url("assets/start.webp"); }
    #startBtn { position: relative; z-index: 2; padding: 18px 64px; font-size: 1.5rem; font-weight: 800; border: none; border-radius: 50px; background: linear-gradient(135deg,#ffcc00,#ff8800); color: #111; cursor: pointer; box-shadow: 0 6px 24px #0008; letter-spacing: 1px; transition: transform .15s, box-shadow .15s; }
    #startBtn:hover { transform: translateY(-3px); }
    #settingsLink { position: absolute; top: 16px; right: 18px; z-index: 10; font-size: 1.5rem; text-decoration: none; opacity: .55; filter: drop-shadow(0 1px 3px #000); transition: opacity .15s; }
    #settingsLink:hover { opacity: 1; }

    /* GUIDE */
    #guideScreen { flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 8vh; }
    #guideScreen .bg-cover { background-image: url("assets/guide_tree.webp"); }
    #guideTree { position: relative; z-index: 2; height: 42vh; max-width: 80vw; width: auto; margin-bottom: 20px; }
    #readyBtn { position: relative; z-index: 2; padding: 18px 64px; font-size: 1.5rem; font-weight: 800; border: none; border-radius: 50px; background: linear-gradient(135deg,#00c853,#00897b); color: #fff; cursor: pointer; box-shadow: 0 6px 24px #0008; letter-spacing: 1px; transition: transform .15s; }
    #readyBtn:hover { transform: translateY(-3px); }
    #readyBtn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* COUNTDOWN */
    #countdownOverlay { display: none; position: fixed; inset: 0; z-index: 200; align-items: center; justify-content: center; background: rgba(0,0,0,.55); }
    #countdownOverlay.active { display: flex; }
    #countdownNumber { font-size: clamp(6rem,20vw,14rem); font-weight: 900; color: #fff; text-shadow: 0 0 40px #ffcc00,0 4px 20px #000; animation: popIn .35s ease-out; }
    @keyframes popIn { from { transform:scale(.4); opacity:0; } to { transform:scale(1); opacity:1; } }

    /* GAME */
    #gameScreen { flex-direction: column; }
    #gameBg { background-image: url("assets/game.webp"); z-index: 0; }
    #houseImg { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: min(840px, 100vw); z-index: 4; pointer-events: none; user-select: none; }
    #houseScore { position: absolute; bottom: 5.5%; left: 50%; transform: translateX(-50%); z-index: 5; pointer-events: none; text-align: center; font-size: clamp(1.6rem,4.5vw,2.8rem); font-weight: 900; color: #1a3a6b; letter-spacing: 2px; text-shadow: 0 1px 0 #fff8; }
    #floodCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
    #cashCanvas  { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: flex-start; justify-content: center;
      gap: 14px; padding: 14px 12px; pointer-events: none;
    }
    .hudCard {
      color: #fff; background: linear-gradient(180deg,#2f67bb 0%,#2a5ca7 100%);
      border: 2px solid rgba(255,255,255,.95); border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.22); overflow: hidden;
    }
    #shakeCard {
      width: min(210px, 52vw); min-height: 74px; padding: 8px 12px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    #shakeTopRow, #timeTopRow {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
      line-height: 1;
    }
    .hudTitle {
      display: flex; flex-direction: column; gap: 2px;
      text-transform: uppercase; font-weight: 900; letter-spacing: .6px; font-size: 1.08rem;
    }
    .hudValue {
      font-weight: 900; font-size: 1.2rem; line-height: 1; white-space: nowrap;
    }
    #shakeProgressTrack {
      height: 10px; border-radius: 999px; overflow: hidden;
      border: 1px solid rgba(255,255,255,.95); background: rgba(255,255,255,.18);
    }
    #shakeProgressFill {
      width: 0%; height: 100%; background: linear-gradient(90deg,#ffffff 0%,#dbe8ff 100%);
      border-radius: inherit; transition: width .15s linear;
    }
    #timeCard {
      width: min(150px, 36vw); min-height: 74px; padding: 9px 12px 8px;
      display: flex; align-items: center; justify-content: center;
    }
    #timeInner {
      display: flex; flex-direction: column; align-items: center; gap: 2px; line-height: 1;
    }
    #timeCard.urgent { background: linear-gradient(180deg,#c62828 0%,#a61d1d 100%); animation: pulse .4s infinite alternate; }
    @keyframes pulse { to { opacity:.6; } }
    .chipIcon { font-size: 1.25rem; line-height: 1; }
    .float-text { position: absolute; font-size: 1.2rem; font-weight: 900; color: #ffd700; text-shadow: 0 2px 8px #000; pointer-events: none; animation: floatUp 1.1s ease-out forwards; z-index: 20; }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(1.4)} }

    /* RESULT SCREEN */
    #resultScreen {
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(160deg,#c9d8f0 0%,#dce8f8 50%,#c9d8f0 100%);
      z-index: 300; overflow: hidden;
    }
    /* Confetti canvas */
    #confettiCanvas { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
    /* Logo */
    #resultLogo { width: min(180px,44vw); margin-bottom: 24px; position: relative; z-index: 1; }
    /* Card */
    #resultCard {
      position: relative; z-index: 1;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,.15);
      padding: 36px 40px 32px;
      width: min(360px, 88vw);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      text-align: center;
    }
    #resultTitle   { font-size: clamp(2rem,7vw,3rem); font-weight: 900; color: #1a56a0; line-height: 1.1; }
    #resultSub     { font-size: clamp(1rem,3.5vw,1.25rem); font-weight: 700; color: #1a56a0; }
    #resultMsg     { font-size: clamp(.85rem,2.5vw,1rem); color: #555; line-height: 1.5; }
    #giftImg       { width: min(130px,32vw); margin: 6px 0; }
    #homeBtn {
      margin-top: 8px; width: 100%;
      padding: 16px 0; font-size: 1.1rem; font-weight: 800;
      border: none; border-radius: 50px;
      background: #1a56a0; color: #fff;
      cursor: pointer; letter-spacing: 1px;
      box-shadow: 0 4px 16px rgba(26,86,160,.35);
      transition: transform .15s, background .15s;
    }
    #homeBtn:hover { background: #1565c0; transform: translateY(-2px); }
  </style>
</head>
<body>

<div id="startScreen" class="screen active">
  <div class="bg-cover"></div>
  <a id="settingsLink" href="settings.html" title="Settings">&#9881;&#65039;</a>
  <button id="startBtn">START</button>
</div>

<div id="guideScreen" class="screen">
  <div class="bg-cover"></div>
  <img id="guideTree" src="assets/tree.gif" alt="tree" />
  <button id="readyBtn">I'M READY!</button>
</div>

<div id="countdownOverlay">
  <div id="countdownNumber">3</div>
</div>

<div id="gameScreen" class="screen">
  <div id="gameBg" class="bg-cover"></div>
  <canvas id="floodCanvas"></canvas>
  <img id="houseImg" src="assets/house.webp" alt="house" />
  <div id="houseScore">0</div>
  <canvas id="cashCanvas"></canvas>
  <div id="hud">
    <div id="shakeCard" class="hudCard">
      <div id="shakeTopRow">
        <div class="hudTitle">SHAKE</div>
      </div>
      <div id="shakeProgressTrack"><div id="shakeProgressFill"></div></div>
    </div>
    <div id="timeCard" class="hudCard">
      <div id="timeInner">
        <div id="timeTopRow">
          <div class="chipIcon">&#9203;</div>
          <div class="hudTitle">TIME</div>
        </div>
        <div class="hudValue" id="timerVal">00:30</div>
      </div>
    </div>
  </div>
</div>

<div id="resultScreen" class="screen">
  <canvas id="confettiCanvas"></canvas>
  <img id="resultLogo" src="assets/logo.webp" alt="iProperty" />
  <div id="resultCard">
    <div id="resultTitle">WINNER!</div>
    <div id="resultSub">RM 1,000,000</div>
    <img id="giftImg" src="assets/gift.webp" alt="gift" />
    <div id="resultMsg">Claim your gift<br>at the registration counter.</div>
    <button id="homeBtn">HOME</button>
  </div>
</div>


<script>
const MODEL_URL = (window.APP_CONFIG && window.APP_CONFIG.modelUrl)
  ? window.APP_CONFIG.modelUrl
  : 'https://teachablemachine.withgoogle.com/models/Ymi7JcSrL/';

// Read admin-configured values from localStorage (set via settings.html)
const _savedDuration      = parseInt(localStorage.getItem('trainer_game_duration'),      10);
const _savedScorePerShake = parseInt(localStorage.getItem('trainer_score_per_shake'),    10);
const _savedWinScore      = parseInt(localStorage.getItem('trainer_win_score'),          10);

const WIN_SCORE = (!isNaN(_savedWinScore) && _savedWinScore > 0) ? _savedWinScore : 1000000;
let WIN_SCORE_CUR = WIN_SCORE;

const CFG = {
  GAME_DURATION:      (!isNaN(_savedDuration) && _savedDuration > 0) ? _savedDuration : 30,
  SCORE_PER_SHAKE:    (!isNaN(_savedScorePerShake) && _savedScorePerShake > 0) ? _savedScorePerShake : 50000,
  DETECT_THRESHOLD:   0.75,
  SHAKE_DECAY:        0.86,
  SHAKE_SCALE:        0.20,
  SHAKE_DROP_THRESH:  0.18,
  MAX_CASH_PER_TICK:  5,
  CASH_GRAVITY:       0.5,
  FLOOD_RATE:         0.001,
  PREDICTION_EVERY_N: 2,
};

let running=false;
let score=0, timeLeft=CFG.GAME_DURATION, timerInterval=null;
let shakeIntensity=0, frameCounter=0, floodLevel=0;
const notes=[];

const cashImg=new Image(); cashImg.src='assets/cash.webp';
const moneyFallSfx = new Audio('assets/money.mp3');
moneyFallSfx.loop = true;
moneyFallSfx.volume = 0.6;
let moneyFallSfxPlaying = false;
let moneyFallPlayToken = 0;
let audioCtx = null;

function startMoneyFallSfx(){
  if(moneyFallSfxPlaying) return;
  moneyFallSfx.muted = false;
  moneyFallSfx.loop = true;
  moneyFallSfxPlaying = true;
  const token = ++moneyFallPlayToken;
  moneyFallSfx.currentTime = 0;
  const playPromise = moneyFallSfx.play();
  if(playPromise && typeof playPromise.then === 'function'){
    playPromise.catch(()=>{
      if(token === moneyFallPlayToken){
        moneyFallSfxPlaying = false;
      }
    });
  }
}

function stopMoneyFallSfx(){
  moneyFallPlayToken++;
  moneyFallSfxPlaying = false;
  moneyFallSfx.muted = true;
  moneyFallSfx.pause();
  moneyFallSfx.currentTime = 0;
}

// Offscreen canvas that accumulates landed notes as a persistent pile
const pileCanvas=document.createElement('canvas');
const pileCtx=pileCanvas.getContext('2d');

const startScreen     = document.getElementById('startScreen');
const guideScreen     = document.getElementById('guideScreen');
const countdownOverlay= document.getElementById('countdownOverlay');
const countdownNumber = document.getElementById('countdownNumber');
const gameScreen      = document.getElementById('gameScreen');
const startBtn        = document.getElementById('startBtn');
const readyBtn        = document.getElementById('readyBtn');
const timerValEl      = document.getElementById('timerVal');
const timeCardEl      = document.getElementById('timeCard');
const houseScoreEl    = document.getElementById('houseScore');
const shakeProgressEl = document.getElementById('shakeProgressFill');
const floodCanvas     = document.getElementById('floodCanvas');

// Set initial timer display from configured duration
timerValEl.textContent = formatTime(CFG.GAME_DURATION);
const floodCtx        = floodCanvas.getContext('2d');
const cashCanvas      = document.getElementById('cashCanvas');
const cashCtx         = cashCanvas.getContext('2d');

function showScreen(id){
  if(id !== 'gameScreen') stopMoneyFallSfx();
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function getAudioCtx(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended'){
    audioCtx.resume().catch(()=>{});
  }
  return audioCtx;
}

function playTone(freq, duration, type='sine', volume=0.06){
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(volume, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + duration + 0.02);
}

function playCountdownTick(){
  playTone(880, 0.12, 'square', 0.05);
}

function playCountdownGo(){
  playTone(740, 0.10, 'triangle', 0.06);
  setTimeout(()=>playTone(988, 0.12, 'triangle', 0.07), 110);
}

function playWinFanfare(){
  playTone(523.25, 0.14, 'triangle', 0.07);
  setTimeout(()=>playTone(659.25, 0.14, 'triangle', 0.07), 140);
  setTimeout(()=>playTone(783.99, 0.20, 'triangle', 0.08), 280);
}

startBtn.addEventListener('click',()=>showScreen('guideScreen'));

readyBtn.addEventListener('click', ()=>{
  runCountdown();
});

function runCountdown(){
  showScreen('guideScreen');
  countdownOverlay.classList.add('active');
  const steps=['3','2','1','GO!'];
  let i=0;
  function step(){
    countdownNumber.textContent=steps[i];
    if(steps[i] === 'GO!') playCountdownGo();
    else playCountdownTick();
    countdownNumber.style.animation='none';
    void countdownNumber.offsetHeight;
    countdownNumber.style.animation='';
    i++;
    if(i<steps.length){ setTimeout(step,900); }
    else { setTimeout(()=>{ countdownOverlay.classList.remove('active'); startGame(); },700); }
  }
  step();
}

function resizeCanvases(){
  floodCanvas.width=cashCanvas.width=pileCanvas.width=window.innerWidth;
  floodCanvas.height=cashCanvas.height=pileCanvas.height=window.innerHeight;
}

function startGame(){
  stopMoneyFallSfx();
  // Re-read settings in case they changed since page load
  const _dur = parseInt(localStorage.getItem('trainer_game_duration'),   10);
  const _sps = parseInt(localStorage.getItem('trainer_score_per_shake'), 10);
  const _win = parseInt(localStorage.getItem('trainer_win_score'),       10);
  if(!isNaN(_dur) && _dur > 0)  CFG.GAME_DURATION   = _dur;
  if(!isNaN(_sps) && _sps > 0)  CFG.SCORE_PER_SHAKE = _sps;
  if(!isNaN(_win) && _win > 0)  WIN_SCORE_CUR        = _win;
  else                           WIN_SCORE_CUR        = WIN_SCORE;

  score=0; timeLeft=CFG.GAME_DURATION;
  shakeIntensity=0;
  floodLevel=0; notes.length=0;
  frameCounter=0; running=true;
  houseScoreEl.textContent='0';
  updateProgressUI();
  document.addEventListener('keydown', onKeyPress);
  // Clear pile canvas
  pileCanvas.width=window.innerWidth;
  pileCanvas.height=window.innerHeight;
  renderCashPile();
  updateScore(); updateTimer();
  showScreen('gameScreen');
  setTimeout(()=>{
    resizeCanvases();
    window.addEventListener('resize',resizeCanvases);
    timerInterval=setInterval(tickTimer,1000);
    requestAnimationFrame(gameLoop);
  },80);
}

function tickTimer(){
  timeLeft--;
  updateTimer();
  if(timeLeft<=0) endGame();
}

function formatTime(s){
  const m=Math.floor(s/60);
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function updateTimer(){
  timerValEl.textContent=formatTime(timeLeft);
  if(timeLeft<=10) timeCardEl.classList.add('urgent');
}

function updateScore(){
  houseScoreEl.textContent=score.toLocaleString();
  updateProgressUI();
  renderCashPile();
  if(running && score>=WIN_SCORE_CUR){ endGame(true); }
}

function updateProgressUI(){
  const ratio = WIN_SCORE_CUR > 0 ? Math.min(score / WIN_SCORE_CUR, 1) : 0;
  shakeProgressEl.style.width = (ratio * 100).toFixed(2) + '%';
  if(ratio >= 1) stopMoneyFallSfx();
}

function hashNoise(seed){
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

function renderCashPile(){
  const W = pileCanvas.width, H = pileCanvas.height;
  pileCtx.clearRect(0,0,W,H);
  if(W === 0 || H === 0 || WIN_SCORE_CUR <= 0) return;

  const ratio = Math.min(score / WIN_SCORE_CUR, 1);
  floodLevel = ratio;
  if(ratio <= 0) return;

  const filledHeight = Math.max(1, H * ratio);
  const top = H - filledHeight;
  const cellW = Math.max(88, Math.round(W / 11));
  const cellH = Math.round(cellW * 0.62);
  const cols = Math.ceil(W / cellW) + 2;
  const rows = Math.ceil(filledHeight / cellH) + 2;
  const safeTop = top + cellH * 0.5;
  const safeBottom = H - cellH * 0.35;

  for(let row=0; row<rows; row++){
    for(let col=0; col<cols; col++){
      const seed = row * 92821 + col * 6113 + Math.round(ratio * 1000);
      const billScale = 0.82 + hashNoise(seed) * 0.5;
      const w = cellW * billScale;
      const h = cellH * billScale;
      const x = col * cellW + hashNoise(seed + 1) * 26 - 13;
      const y = Math.min(safeBottom, Math.max(safeTop, safeTop + row * cellH + hashNoise(seed + 2) * 18 - 9));
      const angle = (hashNoise(seed + 3) - 0.5) * 1.8;

      pileCtx.save();
      pileCtx.translate(x, y);
      pileCtx.rotate(angle);
      if(cashImg.complete && cashImg.naturalWidth > 0){
        pileCtx.drawImage(cashImg, -w/2, -h/2, w, h);
      } else {
        pileCtx.fillStyle = '#4caf50';
        pileCtx.fillRect(-w/2, -h/2, w, h);
        pileCtx.fillStyle = '#fff';
        pileCtx.font = 'bold ' + Math.max(12, Math.round(h * 0.28)) + 'px monospace';
        pileCtx.textAlign = 'center';
        pileCtx.textBaseline = 'middle';
        pileCtx.fillText('RM100', 0, 0);
      }
      pileCtx.restore();
    }
  }
}

function gameLoop(){
  if(!running) return;
  frameCounter++;
  shakeIntensity*=CFG.SHAKE_DECAY;
  if(shakeIntensity<0.005) shakeIntensity=0;
  drawFlood();
  drawNotes();
  requestAnimationFrame(gameLoop);
}

function onKeyPress(){
  if(!running) return;
  spawnNotes();
}

function spawnNotes(){
  const W=cashCanvas.width, H=cashCanvas.height;
  const scale=0.7+Math.random()*0.7;
  const w=120*scale, h=60*scale;
  notes.push({
    x:Math.random()*(W-w), y:-h-Math.random()*200,
    vx:(Math.random()-0.5)*3, vy:2+Math.random()*3,
    angle:(Math.random()-0.5)*0.6, spin:(Math.random()-0.5)*0.04,
    w,h, value:CFG.SCORE_PER_SHAKE, landed:false
  });
}

// Draw a single note onto the persistent pile canvas
// Notes are spread randomly WITHIN the filled region (bottom rising upward)
function addToPile(noteW, noteH){
  const W=pileCanvas.width, H=pileCanvas.height;
  const scale = 0.85+Math.random()*0.45;
  const w=noteW*scale, h=noteH*scale;
  // filledTop is the highest point the pile has reached
  // when floodLevel=0 → filledTop=H (nothing filled); when 1 → filledTop=0 (full)
  const filledTop = H*(1-floodLevel);
  const x = Math.random()*W;
  // Spread note randomly ANYWHERE inside the already-filled area
  const y = filledTop + Math.random()*(H-filledTop);
  const angle = (Math.random()-0.5)*Math.PI*1.8;
  if(cashImg.complete&&cashImg.naturalWidth>0){
    pileCtx.save();
    pileCtx.translate(x,y); pileCtx.rotate(angle);
    pileCtx.drawImage(cashImg,-w/2,-h/2,w,h);
    pileCtx.restore();
  } else {
    pileCtx.save();
    pileCtx.translate(x,y); pileCtx.rotate(angle);
    pileCtx.fillStyle='#4caf50';
    pileCtx.fillRect(-w/2,-h/2,w,h);
    pileCtx.fillStyle='#fff';
    pileCtx.font='bold '+Math.round(h*0.28)+'px monospace';
    pileCtx.textAlign='center'; pileCtx.textBaseline='middle';
    pileCtx.fillText('RM100',0,0);
    pileCtx.restore();
  }
}

function drawFlood(){
  const W=floodCanvas.width, H=floodCanvas.height;
  floodCtx.clearRect(0,0,W,H);
  if(score<=0) return;
  // Blit the score-driven cash pile that grows with the target progress
  floodCtx.drawImage(pileCanvas,0,0);
}

function drawNotes(){
  if(!running){
    stopMoneyFallSfx();
    return;
  }

  const W=cashCanvas.width, H=cashCanvas.height;
  cashCtx.clearRect(0,0,W,H);
  const groundY=H*0.92;
  let hasFallingNotes = false;
  for(let i=notes.length-1;i>=0;i--){
    const n=notes[i];
    if(n.landed){notes.splice(i,1);continue;}
    n.vy+=CFG.CASH_GRAVITY; n.x+=n.vx; n.y+=n.vy; n.angle+=n.spin;
    if(n.y+n.h>=groundY){
      n.landed=true;
      score+=n.value;
      updateScore();
      showFloatingText('+'+n.value, n.x+n.w/2, groundY-10);
      if(!running){
        stopMoneyFallSfx();
        return;
      }
      continue;
    }
    hasFallingNotes = true;
    if(cashImg.complete&&cashImg.naturalWidth>0){
      cashCtx.save();
      cashCtx.translate(n.x+n.w/2,n.y+n.h/2);
      cashCtx.rotate(n.angle);
      cashCtx.drawImage(cashImg,-n.w/2,-n.h/2,n.w,n.h);
      cashCtx.restore();
    } else {
      cashCtx.save();
      cashCtx.translate(n.x+n.w/2,n.y+n.h/2);
      cashCtx.rotate(n.angle);
      cashCtx.fillStyle='#4caf50';
      cashCtx.fillRect(-n.w/2,-n.h/2,n.w,n.h);
      cashCtx.fillStyle='#fff';
      cashCtx.font='bold 14px monospace';
      cashCtx.textAlign='center';
      cashCtx.textBaseline='middle';
      cashCtx.fillText('RM100',0,0);
      cashCtx.restore();
    }
  }

  if(!running){
    stopMoneyFallSfx();
    return;
  }

  if(hasFallingNotes && !moneyFallSfxPlaying){
    startMoneyFallSfx();
  } else if(!hasFallingNotes && moneyFallSfxPlaying){
    stopMoneyFallSfx();
  }
}

function showFloatingText(text,x,y){
  const el=document.createElement('div');
  el.className='float-text'; el.textContent=text;
  el.style.left=x+'px'; el.style.top=y+'px';
  gameScreen.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

function endGame(winner=false){
  stopMoneyFallSfx();
  if(!running) return;
  running=false;
  notes.length = 0;
  clearInterval(timerInterval);
  window.removeEventListener('resize',resizeCanvases);
  document.removeEventListener('keydown', onKeyPress);

  const titleEl = document.getElementById('resultTitle');
  const subEl   = document.getElementById('resultSub');
  const msgEl   = document.getElementById('resultMsg');
  const giftEl  = document.getElementById('giftImg');

  if(winner){
    playWinFanfare();
    titleEl.textContent  = 'WINNER!';
    subEl.textContent    = 'RM ' + WIN_SCORE_CUR.toLocaleString();
    subEl.style.display  = '';
    msgEl.innerHTML      = 'Claim your gift<br>at the registration counter.';
    giftEl.style.display = '';
    startConfetti();
  } else {
    titleEl.textContent  = 'SO CLOSE!';
    subEl.style.display  = 'none';
    msgEl.innerHTML      = 'Get back in line for<br>another try.';
    giftEl.style.display = 'none';
    stopConfetti();
  }

  showScreen('resultScreen');
}

/* ── Confetti ────────────────────────────────────────────── */
const confettiCanvas = document.getElementById('confettiCanvas');
const confCtx = confettiCanvas.getContext('2d');
const confettiPieces = [];
let confettiRunning = false;
let confettiRaf = null;

const CONFETTI_COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#1abc9c','#e67e22','#ff69b4'];

function startConfetti(){
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
  confettiPieces.length = 0;
  for(let i=0;i<160;i++){
    confettiPieces.push({
      x: Math.random()*confettiCanvas.width,
      y: Math.random()*confettiCanvas.height - confettiCanvas.height,
      w: 8+Math.random()*8, h: 4+Math.random()*4,
      angle: Math.random()*Math.PI*2,
      spin: (Math.random()-.5)*.18,
      vx: (Math.random()-.5)*2,
      vy: 2+Math.random()*3,
      color: CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]
    });
  }
  confettiRunning=true;
  drawConfetti();
}

function stopConfetti(){
  confettiRunning=false;
  if(confettiRaf) cancelAnimationFrame(confettiRaf);
  confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
}

function drawConfetti(){
  if(!confettiRunning) return;
  confCtx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  const H=confettiCanvas.height, W=confettiCanvas.width;
  confettiPieces.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.angle+=p.spin;
    if(p.y>H+20){ p.y=-20; p.x=Math.random()*W; }
    confCtx.save();
    confCtx.translate(p.x,p.y); confCtx.rotate(p.angle);
    confCtx.fillStyle=p.color;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  });
  confettiRaf=requestAnimationFrame(drawConfetti);
}

document.getElementById('homeBtn').addEventListener('click',()=>{
  stopMoneyFallSfx();
  stopConfetti();
  readyBtn.disabled=false;
  timeCardEl.classList.remove('urgent');
  showScreen('startScreen');
});
</script>
